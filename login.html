<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SoulPlay — Login</title>
<link rel="stylesheet" href="assets/css/style.css"/>
<link rel="stylesheet" href="assets/css/auth.css"/>

</head>
<body class="auth-body">

  <nav class="navbar">
    <a href="index.html" class="logo">
      <span class="logo-soul">Soul</span><span class="logo-play">Play</span>
    </a>
    <a href="signup.html" class="btn-cta nav-auth-link">Create Account</a>
  </nav>

  <div class="auth-layout">

    <!-- LEFT PANEL -->
    <div class="auth-left">
      <div class="auth-left-inner">
        <div class="al-badge">
          <span class="badge-dot"></span>
          Live Audio Engine
        </div>
        <h2 class="al-title">
          Welcome<br/>
          <span>back.</span>
        </h2>
        <p class="al-sub">
          Your lyrics are waiting.<br/>
          Pick up where you left off.
        </p>
        <div class="al-guitar">
          <div class="al-rings">
            <div class="al-ring al-ring--1"></div>
            <div class="al-ring al-ring--2"></div>
          </div>
          <img src="assets/images/guitar-arctic.png" alt="Guitar"/>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-right">
      <div class="auth-form-wrap">

        <div class="auth-head">
          <h1>Sign In</h1>
          <p>Don't have an account? 
            <a href="signup.html">Create one free →</a>
          </p>
        </div>

        <div class="auth-form">

          <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrap">
              <svg class="input-icon" width="16" height="16" 
                   viewBox="0 0 24 24" fill="none" 
                   stroke="currentColor" stroke-width="1.5">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 
                         2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input type="email" id="loginEmail" 
                     placeholder="you@example.com" 
                     class="form-input"/>
            </div>
          </div>

          <div class="form-group">
            <label>Password
              <a href="#" class="label-link">Forgot password?</a>
            </label>
            <div class="input-wrap">
              <svg class="input-icon" width="16" height="16" 
                   viewBox="0 0 24 24" fill="none" 
                   stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" 
                      rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
              <input type="password" id="loginPassword" 
                     placeholder="••••••••" 
                     class="form-input"/>
              <button class="eye-btn" onclick="togglePass('loginPassword',this)">
                <svg width="16" height="16" viewBox="0 0 24 24" 
                     fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 
                           8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-check">
            <label class="check-label">
              <input type="checkbox" id="rememberMe"/>
              <span class="check-box"></span>
              Remember me for 30 days
            </label>
          </div>

          <button class="btn-submit" onclick="handleLogin()">
            <span>Sign In</span>
            <svg width="16" height="16" viewBox="0 0 24 24" 
                 fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>

          <div class="auth-divider">
            <span>or continue with</span>
          </div>

          <button class="btn-google" onclick="handleGoogle()">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53
                -.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 
                3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 
                7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 
                1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 
                20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35
                -1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 
                8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22
                .81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 
                4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 
                7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 
                3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
          </button>

        </div>

        <div class="auth-footer-note">
          By signing in you agree to our 
          <a href="#">Terms</a> and 
          <a href="#">Privacy Policy</a>
        </div>

      </div>
    </div>

  </div>

<script src="assets/js/auth.js"></script>
</body>
</html>
